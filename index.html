<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Services</title>
    <link rel="stylesheet" href="style.css">
    <style>
     /* style.css */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#ffffff;
}

/* Navbar */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 80px;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.nav-links{
    display:flex;
    list-style:none;
    gap:30px;
}

.nav-links a{
    text-decoration:none;
    color:#333;
    font-size:16px;
}

/* Hero Section */

.hero{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:60px 80px;
    min-height:80vh;
}

.hero-text{
    max-width:500px;
}

.hero-text h1{
    font-size:55px;
    line-height:1.3;
    color:#222;
}

.hero-text span{
    color:#1e90ff;
}

.hero-text p{
    margin-top:20px;
    color:#666;
    line-height:1.8;
    font-size:18px;
}

/* Button Hover Transform */

.cta-btn{
    margin-top:30px;
    padding:16px 35px;
    border:none;
    background:#1e90ff;
    color:white;
    font-size:18px;
    border-radius:12px;
    cursor:pointer;

    transition:0.4s ease;
}

/* TASK REQUIREMENT */

.cta-btn:hover{
    transform:scale(1.1) rotate(-3deg);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* Image */

.hero-image img{
    width:420px;
}

/* Responsive */

@media(max-width:900px){

    .hero{
        flex-direction:column;
        text-align:center;
    }

    .hero-image img{
        width:300px;
        margin-top:40px;
    }

    .hero-text h1{
        font-size:40px;
    }

    .navbar{
        flex-direction:column;
        gap:20px;
    }
}   
    </style>
</head>
<body>
      <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">Logo</div>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">About Us</a></li>
      <li><a href="#">Contact Us</a></li>
    </ul>
  </nav>

  <!-- Hero Section -->
  <section class="hero">

    <div class="hero-text">
      <h1>
        Revitalize Your <br>
        Clothes with Expert <br>
        <span>Laundry Services!</span>
      </h1>

      <p>
        From premium dry cleaning to swift wash and fold,
        we deliver care and convenience. Schedule a pickup
        and rediscover the freshness of your clothes today!
      </p>

      <button class="cta-btn">
        Book a service today!
      </button>
    </div>

    <div class="hero-image">
      <img src="https://cdn-icons-png.flaticon.com/512/3082/3082037.png" alt="Laundry Machine">
    </div>

  </section>

</body>
</html>
